<!--
  Orust Stugstäd – landskap: sjöbodar vid en brygga
  Flat, "paper-cut"-liknande siluetter i falurött – en västkustdetalj i
  hero-bakgrunden. Håll paletten inom röd/roströd-familjen (#8B3226 m.fl.)
  om fler bodar läggs till senare.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 150" role="img" aria-label="Röda sjöbodar vid en brygga">
  <!-- brygga -->
  <line x1="0" y1="120" x2="228" y2="120" stroke="#948C7E" stroke-width="2"/>
  <rect x="18" y="120" width="4" height="16" fill="#948C7E"/>
  <rect x="88" y="120" width="4" height="16" fill="#948C7E"/>
  <rect x="176" y="120" width="4" height="16" fill="#948C7E"/>

  <!-- bakre, ljusare bod -->
  <g fill="#B0614C">
    <rect x="6" y="80" width="52" height="40"/>
    <path d="M2 80 L62 80 L32 52 Z"/>
  </g>

  <!-- minsta boden, längst bak till höger -->
  <g fill="#C4826A">
    <rect x="172" y="92" width="34" height="28"/>
    <path d="M169 92 L210 92 L190 74 Z"/>
  </g>

  <!-- främre, störst och mörkast -->
  <g fill="#8B3226">
    <rect x="54" y="58" width="62" height="62"/>
    <path d="M48 58 L122 58 L85 26 Z"/>
  </g>
  <rect x="76" y="90" width="16" height="28" fill="#FBEFE4"/>
  <rect x="98" y="72" width="12" height="12" fill="#FBEFE4"/>

  <!-- liten bod till höger -->
  <g fill="#A6543F">
    <rect x="121" y="84" width="46" height="36"/>
    <path d="M117 84 L171 84 L144 60 Z"/>
  </g>
  <rect x="137" y="98" width="10" height="10" fill="#FBEFE4"/>
</svg>
