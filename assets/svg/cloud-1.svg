<!--
  Orust Stugstäd – landskap: mjukt, oskarpt moln (variant 1)
  Medvetet abstrakt/suddigt snarare än ett tecknat "moln-ikon"-utseende,
  för en diskret, seriös känsla. Färgen sätts av CSS (mask + background) om
  behov finns att ändra ton senare – just nu ren ljusblå/grå fyllning.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" role="img" aria-label="Mjukt moln">
  <defs>
    <filter id="soft1" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>
  <g filter="url(#soft1)" fill="#E7EEF3">
    <ellipse cx="150" cy="120" rx="120" ry="55"/>
    <ellipse cx="250" cy="100" rx="95" ry="60"/>
  </g>
</svg>
